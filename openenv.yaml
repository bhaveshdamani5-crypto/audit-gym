name: inventory-gym
version: 1.0.0
description: "Global Strategic Resource Management & ESG Resilience Environment"
type: openenv
tags: ["supply-chain", "logistics", "ai-reasoning", "multi-objective", "esg"]
tasks:
  - id: inventory_easy_task
    name: "Inventory Easy: Local Stewardship"
    difficulty: easy
    description: "Manage a single local hub with stable demand patterns."
    grader: inventory_gym.grader.grade_easy
  - id: inventory_medium_task
    name: "Inventory Medium: Regional Coordination"
    difficulty: medium
    description: "Coordinate a 3-node global network (London, Tokyo, Mumbai) with occasional regional shocks."
    grader: inventory_gym.grader.grade_medium
  - id: inventory_hard_task
    name: "Inventory Hard: Global Strategic Nexus"
    difficulty: hard
    description: "Secure a 5-node global nexus against continuous systemic shocks and ESG constraints."
    grader: inventory_gym.grader.grade_hard
models:
  action: inventory_gym.models.Action
  observation: inventory_gym.models.InventoryObservation
  step_response: inventory_gym.models.StepResponse
  reset_response: inventory_gym.models.ResetResponse
  warehouse: inventory_gym.models.Warehouse
  order: inventory_gym.models.Order
environment: inventory_gym.env.InventoryGymEnv
